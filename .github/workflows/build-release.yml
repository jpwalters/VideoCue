name: Build Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.4.2

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # Disable pip caching temporarily to debug install issues
          # cache: 'pip'
          # cache-dependency-path: 'requirements-build.lock.txt'
      
      - name: Install dependencies
        run: |
          # Upgrade pip and setuptools FIRST to prevent mid-install corruption
          python -m pip install --upgrade pip setuptools
          
          # Now install packages with stable setuptools (no --force-reinstall to avoid re-uninstalling setuptools)
          python -m pip install --no-cache-dir -r requirements-build.lock.txt
          
          Write-Host "`n=== POST-INSTALL VERIFICATION ==="
          
          # Create test script (avoid here-string for YAML compatibility)
          "import sys" | Out-File -FilePath "test_imports.py" -Encoding utf8
          "print('Python executable:', sys.executable)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "print('Python version:', sys.version)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "print('sys.path:', sys.path)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "print()" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "try:" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    from StreamDeck.DeviceManager import DeviceManager" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    print('SUCCESS: StreamDeck imported')" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "except Exception as e:" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    print('FAILED: StreamDeck import error:', e)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    import traceback; traceback.print_exc(); sys.exit(1)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "try:" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    import hid" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    print('SUCCESS: hid imported')" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "except Exception as e:" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    print('FAILED: hid import error:', e); sys.exit(1)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "try:" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    from PIL import Image" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    print('SUCCESS: Pillow imported')" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "except Exception as e:" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "    print('FAILED: Pillow import error:', e); sys.exit(1)" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "print()" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          "print('=== All imports successful! ===')" | Out-File -FilePath "test_imports.py" -Encoding utf8 -Append
          
          python test_imports.py
          if ($LASTEXITCODE -ne 0) {
            Remove-Item test_imports.py -ErrorAction SilentlyContinue
            Write-Host "✗ Import verification failed"
            exit 1
          }
          Remove-Item test_imports.py -ErrorAction SilentlyContinue
          
      - name: Verify installed packages
        run: |
          Write-Host "Python diagnostics:"
          Write-Host "  which python: $(Get-Command python | Select-Object -ExpandProperty Source)"
          Write-Host "  which pip: $(Get-Command pip | Select-Object -ExpandProperty Source)"
          python --version
          pip --version
          Write-Host "`nPython sys.path:"
          python -c "import sys; print('\n'.join(sys.path))"
          Write-Host "`nInstalled packages:"
          pip list | Select-String -Pattern "(streamdeck|hidapi|pillow|pyqt6|pygame)"
          Write-Host "`nWhere is streamdeck installed?"
          pip show streamdeck | Select-String -Pattern "Location:"
      
      - name: Download hidapi DLL for Stream Deck support
        run: |
          Write-Host "Downloading hidapi.dll for Stream Deck Plus support..."
          $hidapiUrl = "https://github.com/libusb/hidapi/releases/download/hidapi-0.14.0/hidapi-win.zip"
          $tempZip = "$env:TEMP\hidapi-win.zip"
          $tempExtract = "$env:TEMP\hidapi-extract"
          
          Invoke-WebRequest -Uri $hidapiUrl -OutFile $tempZip
          Expand-Archive -Path $tempZip -DestinationPath $tempExtract -Force
          
          # Copy x64 DLL to project root and site-packages
          Copy-Item "$tempExtract\x64\hidapi.dll" -Destination "hidapi.dll" -Force
          Write-Host "✓ hidapi.dll downloaded to project root"
          
          # Also copy to site-packages for runtime
          $sitePackages = python -c "import site; print(site.getsitepackages()[0])"
          Copy-Item "$tempExtract\x64\hidapi.dll" -Destination "$sitePackages\hidapi.dll" -Force
          Write-Host "✓ hidapi.dll copied to site-packages: $sitePackages"
          
          Remove-Item $tempZip, $tempExtract -Recurse -Force
      
      - name: Verify Stream Deck dependencies
        run: |
          Write-Host "Checking Stream Deck dependencies...`n"
          
          # Check for hidapi.dll
          if (Test-Path "hidapi.dll") {
            $dllSize = (Get-Item "hidapi.dll").Length / 1KB
            Write-Host "✓ hidapi.dll found ($([math]::Round($dllSize, 2)) KB)"
          } else {
            Write-Host "✗ WARNING: hidapi.dll not found!"
          }
          
          # Diagnostic: show environment before imports
          Write-Host "`nDiagnostics before import test:"
          python -c "import sys; print('Python executable:', sys.executable)"
          python -c "import sys; print('sys.path:', sys.path)"
          
          # Show what's actually installed
          Write-Host "`nInstalled packages:"
          python -m pip list | Select-String -Pattern "(streamdeck|hidapi|pillow)"
          
          Write-Host "`nPackage details:"
          python -m pip show streamdeck hidapi pillow
          
          # Test all packages in a single command
          Write-Host "`nTesting Python imports..."
          python -c "from StreamDeck.DeviceManager import DeviceManager; import hid; from PIL import Image; print('SUCCESS: All packages import successfully')"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "SUCCESS: All Stream Deck dependencies working"
          } else {
            Write-Host "FAILED: Import failed"
            Write-Host "`nPost-failure diagnostics:"
            python -c "import sys; print('Python:', sys.executable); print('sys.path:', sys.path)"
            exit 1
          }
      
      - name: Download and Install NDI SDK
        run: |
          .\Install-NDI-SDK.ps1 -OutputDir "videocue\ndi_wrapper"
      
      - name: Verify NDI bindings are bundled
        run: |
          Write-Host "Checking for bundled NDI bindings and DLLs...`n"
          
          # Check for NDI wrapper module
          if (Test-Path "videocue\ndi_wrapper\__init__.py") {
            Write-Host "✓ NDI wrapper module found"
          } else {
            Write-Host "✗ ERROR: NDI wrapper module not found!"
            exit 1
          }
          
          # Check for NDI bindings (.pyd file for current Python version)
          if (Test-Path "videocue\ndi_wrapper\NDIlib.cp310-win_amd64.pyd") {
            Write-Host "✓ NDI bindings (Python 3.10) found"
          } elseif (Test-Path "videocue\ndi_wrapper\NDIlib.cp312-win_amd64.pyd") {
            Write-Host "✓ NDI bindings (Python 3.12) found"
          } else {
            Write-Host "✗ ERROR: No NDI .pyd bindings found!"
            exit 1
          }
          
          # Check for NDI Runtime DLL
          if (Test-Path "videocue\ndi_wrapper\Processing.NDI.Lib.x64.dll") {
            Write-Host "✓ NDI Runtime DLL found"
            $dllSize = (Get-Item "videocue\ndi_wrapper\Processing.NDI.Lib.x64.dll").Length / 1MB
            Write-Host "  Size: $([math]::Round($dllSize, 2)) MB`n"
          } else {
            Write-Host "✗ ERROR: NDI Runtime DLL not found in ndi_wrapper!"
            exit 1
          }

      - name: NDI binary preflight diagnostics
        run: |
          python -c "from pathlib import Path; import sys; w=Path('videocue/ndi_wrapper'); tag=f'cp{sys.version_info.major}{sys.version_info.minor}'; all_pyd=sorted(p.name for p in w.glob('NDIlib*.pyd')); match=sorted(p.name for p in w.glob(f'NDIlib.{tag}-*.pyd')); selected=(match if match else all_pyd); dll=w / 'Processing.NDI.Lib.x64.dll'; print(f'[NDI preflight] python_tag={tag}'); print(f'[NDI preflight] all_pyd={all_pyd}'); print(f'[NDI preflight] selected_pyd={selected}'); print(f'[NDI preflight] dll_present={dll.exists()} path={dll}');"
          pyinstaller --version
      
      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref }}".Split('/')[-1]
          $version = $tag -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
      
      - name: Run build script
        run: |
          .\build.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Verify packaged runtime DLLs
        run: |
          .\tools\verify_runtime_dlls.ps1 -DistRoot ".\dist\VideoCue"
      
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            installer_output/VideoCue-${{ steps.version.outputs.version }}-Setup.exe
            installer_output/VideoCue-${{ steps.version.outputs.version }}-portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-windows
          path: |
            dist/VideoCue/
            installer_output/
          retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install --no-cache-dir -r requirements-build.lock.txt

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build app with PyInstaller
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh --version "${{ steps.version.outputs.version }}"

      - name: Upload macOS artifact to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            installer_output/VideoCue-${{ steps.version.outputs.version }}-macOS.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-macos
          path: |
            dist/
            installer_output/
          retention-days: 30
