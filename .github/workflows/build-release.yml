name: Build Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.4.2

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements-build.lock.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.lock.txt
          
      - name: Verify installed packages
        run: |
          Write-Host "Installed packages:"
          pip list | Select-String -Pattern "(streamdeck|hidapi|pillow|pyqt6|pygame)"
      
      - name: Download hidapi DLL for Stream Deck support
        run: |
          Write-Host "Downloading hidapi.dll for Stream Deck Plus support..."
          $hidapiUrl = "https://github.com/libusb/hidapi/releases/download/hidapi-0.14.0/hidapi-win.zip"
          $tempZip = "$env:TEMP\hidapi-win.zip"
          $tempExtract = "$env:TEMP\hidapi-extract"
          
          Invoke-WebRequest -Uri $hidapiUrl -OutFile $tempZip
          Expand-Archive -Path $tempZip -DestinationPath $tempExtract -Force
          
          # Copy x64 DLL to project root and site-packages
          Copy-Item "$tempExtract\x64\hidapi.dll" -Destination "hidapi.dll" -Force
          Write-Host "✓ hidapi.dll downloaded to project root"
          
          # Also copy to site-packages for runtime
          $sitePackages = python -c "import site; print(site.getsitepackages()[0])"
          Copy-Item "$tempExtract\x64\hidapi.dll" -Destination "$sitePackages\hidapi.dll" -Force
          Write-Host "✓ hidapi.dll copied to site-packages: $sitePackages"
          
          Remove-Item $tempZip, $tempExtract -Recurse -Force
      
      - name: Verify Stream Deck dependencies
        run: |
          Write-Host "Checking Stream Deck dependencies...`n"
          
          # Check for hidapi.dll
          if (Test-Path "hidapi.dll") {
            $dllSize = (Get-Item "hidapi.dll").Length / 1KB
            Write-Host "✓ hidapi.dll found ($([math]::Round($dllSize, 2)) KB)"
          } else {
            Write-Host "✗ WARNING: hidapi.dll not found!"
          }
          
          # Check Python packages (properly check exit codes)
          python -c "import streamdeck"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ streamdeck package installed"
            python -c "import streamdeck; print(streamdeck.__version__)" | ForEach-Object { Write-Host "  Version: $_" }
          } else {
            Write-Host "✗ streamdeck not found"
            exit 1
          }
          
          python -c "import hid"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ hidapi Python package installed"
          } else {
            Write-Host "✗ hidapi not found"
            exit 1
          }
          
          python -c "from PIL import Image"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ Pillow package installed"
          } else {
            Write-Host "✗ Pillow not found"
            exit 1
          }
      
      - name: Download and Install NDI SDK
        run: |
          .\Install-NDI-SDK.ps1 -OutputDir "videocue\ndi_wrapper"
      
      - name: Verify NDI bindings are bundled
        run: |
          Write-Host "Checking for bundled NDI bindings and DLLs...`n"
          
          # Check for NDI wrapper module
          if (Test-Path "videocue\ndi_wrapper\__init__.py") {
            Write-Host "✓ NDI wrapper module found"
          } else {
            Write-Host "✗ ERROR: NDI wrapper module not found!"
            exit 1
          }
          
          # Check for NDI bindings (.pyd file for current Python version)
          if (Test-Path "videocue\ndi_wrapper\NDIlib.cp310-win_amd64.pyd") {
            Write-Host "✓ NDI bindings (Python 3.10) found"
          } elseif (Test-Path "videocue\ndi_wrapper\NDIlib.cp312-win_amd64.pyd") {
            Write-Host "✓ NDI bindings (Python 3.12) found"
          } else {
            Write-Host "✗ ERROR: No NDI .pyd bindings found!"
            exit 1
          }
          
          # Check for NDI Runtime DLL
          if (Test-Path "videocue\ndi_wrapper\Processing.NDI.Lib.x64.dll") {
            Write-Host "✓ NDI Runtime DLL found"
            $dllSize = (Get-Item "videocue\ndi_wrapper\Processing.NDI.Lib.x64.dll").Length / 1MB
            Write-Host "  Size: $([math]::Round($dllSize, 2)) MB`n"
          } else {
            Write-Host "✗ ERROR: NDI Runtime DLL not found in ndi_wrapper!"
            exit 1
          }

      - name: NDI binary preflight diagnostics
        run: |
          python -c "from pathlib import Path; import sys; w=Path('videocue/ndi_wrapper'); tag=f'cp{sys.version_info.major}{sys.version_info.minor}'; all_pyd=sorted(p.name for p in w.glob('NDIlib*.pyd')); match=sorted(p.name for p in w.glob(f'NDIlib.{tag}-*.pyd')); selected=(match if match else all_pyd); dll=w / 'Processing.NDI.Lib.x64.dll'; print(f'[NDI preflight] python_tag={tag}'); print(f'[NDI preflight] all_pyd={all_pyd}'); print(f'[NDI preflight] selected_pyd={selected}'); print(f'[NDI preflight] dll_present={dll.exists()} path={dll}');"
          pyinstaller --version
      
      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref }}".Split('/')[-1]
          $version = $tag -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
      
      - name: Run build script
        run: |
          .\build.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Verify packaged runtime DLLs
        run: |
          .\tools\verify_runtime_dlls.ps1 -DistRoot ".\dist\VideoCue"
      
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            installer_output/VideoCue-${{ steps.version.outputs.version }}-Setup.exe
            installer_output/VideoCue-${{ steps.version.outputs.version }}-portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist/VideoCue/
            installer_output/
          retention-days: 30
