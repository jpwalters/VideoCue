name: Build CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # Disable pip caching temporarily to debug install issues
          # cache: 'pip'
          # cache-dependency-path: 'requirements-build.lock.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-cache-dir -r requirements-build.lock.txt
          
          Write-Host "`n=== IMMEDIATE POST-INSTALL DIAGNOSTICS ==="
          
          # Get ALL site-packages locations (getsitepackages returns a list)
          python -c "import site; print('All site-packages paths:'); [print(f'  {p}') for p in site.getsitepackages()]"
          
          # Get the correct site-packages directory (look for lib\site-packages)
          $sitePackages = python -c "import site; sp = [p for p in site.getsitepackages() if 'site-packages' in p]; print(sp[0] if sp else site.getsitepackages()[0])"
          Write-Host "`nUsing site-packages: $sitePackages"
          Write-Host "Python executable: $(python -c 'import sys; print(sys.executable)')"
          
          # Check if package files physically exist
          Write-Host "`nPhysical file check:"
          if (Test-Path "$sitePackages\streamdeck") {
            Write-Host "✓ streamdeck directory EXISTS"
            $files = Get-ChildItem "$sitePackages\streamdeck" -File | Select-Object -First 5
            Write-Host "  Files: $($files.Name -join ', ')"
          } else {
            Write-Host "✗ streamdeck directory DOES NOT EXIST in $sitePackages"
            Write-Host "  Contents of $sitePackages (first 30 items):"
            Get-ChildItem $sitePackages | Select-Object -First 30 | ForEach-Object { 
              $type = if ($_.PSIsContainer) { "DIR" } else { "FILE" }
              Write-Host "    [$type] $($_.Name)"
            }
          }
          
          if (Test-Path "$sitePackages\hid.pyd") {
            Write-Host "✓ hid.pyd EXISTS (binary module)"
          } elseif (Test-Path "$sitePackages\hid\__init__.py") {
            Write-Host "✓ hid package EXISTS"
          } else {
            Write-Host "✗ hid module DOES NOT EXIST"
          }
          
          if (Test-Path "$sitePackages\PIL") {
            Write-Host "✓ PIL directory EXISTS"
          } else {
            Write-Host "✗ PIL directory DOES NOT EXIST"
          }
          
          # Try import test
          Write-Host "`nImport test:"
          python -c "import streamdeck; print('✓ streamdeck imports OK'); print('  Version:', streamdeck.__version__); print('  Location:', streamdeck.__file__)"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "✗ IMPORT FAILED"
            python -c "import sys; print('sys.path:', sys.path)"
            exit 1
          }
          
      - name: Verify installed packages
        run: |
          Write-Host "Python diagnostics:"
          Write-Host "  which python: $(Get-Command python | Select-Object -ExpandProperty Source)"
          Write-Host "  which pip: $(Get-Command pip | Select-Object -ExpandProperty Source)"
          python --version
          pip --version
          Write-Host "`nInstalled packages:"
          pip list | Select-String -Pattern "(streamdeck|hidapi|pillow|pyqt6|pygame)"
          Write-Host "`nWhere is streamdeck installed?"
          pip show streamdeck | Select-String -Pattern "Location:"
      
      - name: Download hidapi DLL for Stream Deck support
        run: |
          Write-Host "Downloading hidapi.dll for Stream Deck Plus support..."
          $hidapiUrl = "https://github.com/libusb/hidapi/releases/download/hidapi-0.14.0/hidapi-win.zip"
          $tempZip = "$env:TEMP\hidapi-win.zip"
          $tempExtract = "$env:TEMP\hidapi-extract"
          
          Invoke-WebRequest -Uri $hidapiUrl -OutFile $tempZip
          Expand-Archive -Path $tempZip -DestinationPath $tempExtract -Force
          
          # Copy x64 DLL to project root
          Copy-Item "$tempExtract\x64\hidapi.dll" -Destination "hidapi.dll" -Force
          Write-Host "✓ hidapi.dll downloaded to project root"
          
          Remove-Item $tempZip, $tempExtract -Recurse -Force
      
      - name: Verify Stream Deck dependencies
        run: |
          Write-Host "Checking Stream Deck dependencies...`n"
          
          # Check for hidapi.dll
          if (Test-Path "hidapi.dll") {
            $dllSize = (Get-Item "hidapi.dll").Length / 1KB
            Write-Host "✓ hidapi.dll found ($([math]::Round($dllSize, 2)) KB)"
          } else {
            Write-Host "✗ WARNING: hidapi.dll not found!"
          }
          
          # Diagnostic: show environment before imports
          Write-Host "`nDiagnostics before import test:"
          python -c "import sys; print('Python executable:', sys.executable)"
          python -c "import sys; print('sys.path:', sys.path)"
          
          # Show what's actually installed
          Write-Host "`nInstalled packages:"
          python -m pip list | Select-String -Pattern "(streamdeck|hidapi|pillow)"
          
          Write-Host "`nPackage details:"
          python -m pip show streamdeck hidapi pillow
          
          # Test all packages in a single command
          Write-Host "`nTesting Python imports..."
          python -c "import streamdeck; import hid; from PIL import Image; print('✓ All packages import successfully'); print('streamdeck version:', streamdeck.__version__)"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ All Stream Deck dependencies working"
          } else {
            Write-Host "✗ Import failed"
            Write-Host "`nPost-failure diagnostics:"
            python -c "import sys; print('Python:', sys.executable); print('sys.path:', sys.path)"
            exit 1
          }
      
      - name: Verify NDI bindings are bundled
        run: |
          if (Test-Path "videocue\ndi_wrapper\NDIlib.cp310-win_amd64.pyd") {
            Write-Host "✓ NDI bindings found"
          } else {
            Write-Host "✗ WARNING: NDI bindings not found. NDI features disabled in build."
          }

      - name: NDI binary preflight diagnostics
        run: |
          python -c "from pathlib import Path; import sys; w=Path('videocue/ndi_wrapper'); tag=f'cp{sys.version_info.major}{sys.version_info.minor}'; all_pyd=sorted(p.name for p in w.glob('NDIlib*.pyd')); match=sorted(p.name for p in w.glob(f'NDIlib.{tag}-*.pyd')); selected=(match if match else all_pyd); dll=w / 'Processing.NDI.Lib.x64.dll'; print(f'[NDI preflight] python_tag={tag}'); print(f'[NDI preflight] all_pyd={all_pyd}'); print(f'[NDI preflight] selected_pyd={selected}'); print(f'[NDI preflight] dll_present={dll.exists()} path={dll}');"
          pyinstaller --version
      
      - name: Lint with ruff
        run: |
          ruff check .
      
      - name: Run tests
        run: |
          # Add test commands here if you add pytest tests
          python -m pytest videocue/test/ -v || echo "No tests configured yet"
        continue-on-error: true
      
      - name: Build executable
        run: |
          pyinstaller VideoCue.spec

      - name: Verify packaged runtime DLLs
        run: |
          .\tools\verify_runtime_dlls.ps1 -DistRoot ".\dist\VideoCue"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideoCue-build-${{ github.sha }}
          path: dist/VideoCue/
          retention-days: 7
